name: Generate AI Digest

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual trigger for testing

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser anthropic

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_digest.py

      - name: Commit and push
        run: |
          git config user.name "ai-digest-bot"
          git config user.email "bot@noreply.github.com"
          git add docs/ seen_items.json
          git diff --staged --quiet || git commit -m "digest: $(date -u +'%Y-%m-%d %H:%M')"
          git push
