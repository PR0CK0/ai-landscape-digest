# AI Landscape Digest — GitHub Actions scheduled runner
#
# Runs on a schedule, summarizes new AI releases, and deploys output to GitHub Pages.
# See CLOUD_MODE.md for full setup instructions.
#
# Required GitHub Actions configuration (Settings → Secrets and variables → Actions):
#
#   Secrets (encrypted):
#     GEMINI_API_KEY         if using gemini  (free tier available)
#     ANTHROPIC_API_KEY      if using claude
#     OPENAI_API_KEY         if using codex
#
#   Variables (plaintext):
#     PAGES_USERNAME  your GitHub username
#     PAGES_REPO      your repo name (e.g. ai-landscape-digest)
#     PAGES_TZ        your timezone (e.g. America/New_York) — optional, defaults to UTC
#     PAGES_URL       your custom domain URL (e.g. https://procko.pro/ai-landscape-digest) — optional
#     PAGES_MODEL     Gemini model name — optional, defaults to gemini-2.0-flash-lite
#                     Avoid gemini-2.5-flash: it's a thinking model that ignores formatting rules

name: AI Landscape Digest

on:
  workflow_dispatch:  # trigger manually: Actions → AI Digest → Run workflow
    inputs:
      force:
        description: 'Force re-process all items (ignores seen cache)'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours — adjust to taste
    # - cron: '0 8 * * *'  # daily at 8am UTC

permissions:
  contents: write  # needed to update ci-state branch with accumulated state
  pages: write     # deploy to GitHub Pages
  id-token: write  # required by actions/deploy-pages for OIDC auth

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install --quiet feedparser pyyaml

      # ── Cache npm to speed up CLI install ────────────────────────────────────
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-gemini-cli-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-gemini-cli-

      # ── Install your LLM CLI — uncomment the one matching your backend ───────

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli
      # - name: Install Claude CLI
      #   run: npm install -g @anthropic-ai/claude-code
      # - name: Install Codex CLI
      #   run: npm install -g @openai/codex

      # ─────────────────────────────────────────────────────────────────────────

      - name: Generate cloud config
        env:
          PAGES_USERNAME: ${{ vars.PAGES_USERNAME }}
          PAGES_REPO: ${{ vars.PAGES_REPO }}
          PAGES_TZ: ${{ vars.PAGES_TZ }}
          PAGES_URL: ${{ vars.PAGES_URL }}
          PAGES_MODEL: ${{ vars.PAGES_MODEL }}
        run: |
          MODEL="${PAGES_MODEL:-gemini-2.0-flash-lite}"
          cat > config.cloud.yaml << EOF
          backend: gemini
          model: ${MODEL}
          output: github_pages
          github_pages:
            username: ${PAGES_USERNAME}
            repo: ${PAGES_REPO}
            base_url: "${PAGES_URL}"
          include_defaults: true
          custom_feeds: []
          seen_ttl_days: 30
          verbose: false
          timezone: "${PAGES_TZ}"
          EOF

      # ── Restore seen_items + digest history from ci-state branch ─────────────
      - name: Restore CI state
        run: |
          if git fetch origin ci-state 2>/dev/null; then
            git show origin/ci-state:seen_items.json > seen_items.json 2>/dev/null || true
            mkdir -p docs
            git show origin/ci-state:digests.json > docs/digests.json 2>/dev/null || true
          else
            echo "No ci-state branch yet — starting fresh"
          fi

      - name: Run digest
        id: run-digest
        continue-on-error: true
        env:
          DIGEST_TRIGGER: ${{ github.event_name == 'workflow_dispatch' && 'github_actions_manual' || 'github_actions_scheduled' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python3 -m ai_digest --config config.cloud.yaml $FORCE_FLAG

      # ── Deploy to Pages only when there is new output ────────────────────────
      - name: Check for new output
        id: docs-check
        run: |
          if [ "${{ steps.run-digest.outcome }}" = "failure" ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "### LLM error — deployment skipped" >> $GITHUB_STEP_SUMMARY
            echo "The digest step exited with an error (quota exceeded, API failure, or model unavailable)." >> $GITHUB_STEP_SUMMARY
            echo "No changes were made to the site or CI state." >> $GITHUB_STEP_SUMMARY
          elif [ -f docs/index.html ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "### New digest published" >> $GITHUB_STEP_SUMMARY
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "### No new items — site unchanged" >> $GITHUB_STEP_SUMMARY
            echo "All feeds are caught up. Pages deployment skipped." >> $GITHUB_STEP_SUMMARY
          fi

      # ── Save seen_items + digest history back to ci-state branch ─────────────
      - name: Save CI state
        if: steps.docs-check.outputs.exists == 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin ci-state 2>/dev/null || true
          cp .github/ci-state-README.md ci-state-README.md
          BLOB_SEEN=$(git hash-object -w seen_items.json)
          BLOB_DIGESTS=$(git hash-object -w docs/digests.json)
          BLOB_README=$(git hash-object -w ci-state-README.md)
          TREE=$(printf "100644 blob %s\tseen_items.json\n100644 blob %s\tdigests.json\n100644 blob %s\tREADME.md" \
            "$BLOB_SEEN" "$BLOB_DIGESTS" "$BLOB_README" | git mktree)
          if git rev-parse origin/ci-state >/dev/null 2>&1; then
            COMMIT=$(git commit-tree "$TREE" -p origin/ci-state -m "Update CI state [skip ci]")
          else
            COMMIT=$(git commit-tree "$TREE" -m "Initialize CI state [skip ci]")
          fi
          git push origin "$COMMIT:refs/heads/ci-state"

      - name: Upload Pages artifact
        if: steps.docs-check.outputs.exists == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        if: steps.docs-check.outputs.exists == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
