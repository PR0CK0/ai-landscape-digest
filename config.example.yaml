# ai-digest — configuration reference
# ─────────────────────────────────────────────────────────────────────────────
# Copy this file to config.yaml and edit to taste.
# config.yaml is gitignored by default — personal settings stay local.
# Exception: if you use GitHub Pages mode (output: github_pages) with a local
# push workflow, you will need config.yaml committed in your fork.
# ─────────────────────────────────────────────────────────────────────────────


# ── LLM backend ──────────────────────────────────────────────────────────────
# Which CLI tool to use for summarization.
# Options:
#   claude  — Claude Code CLI  (default; uses your existing subscription)
#   gemini  — Gemini CLI
#   codex   — OpenAI Codex CLI
#   ollama  — local Ollama (free; great on M-series Macs)
backend: claude

# Model to pass to the backend CLI.
# "default" lets each CLI pick its own model — fine for most backends.
# For claude, consider setting a specific model: the CLI default may be an expensive one.
# Check `claude --help` for current model names; look for the smallest/fastest haiku variant.
# Examples:
#   claude: <haiku model name>   (fast, cheap — recommended for a digest)
#           <sonnet model name>  (smarter, slower, more expensive)
#   gemini: gemini-2.5-flash     (fast, free tier available)
#           gemini-2.5-pro
#   codex:  gpt-4o-mini          (cheap)
#           gpt-4o
#   ollama: ministral-3b:3b      (~10s, very light — recommended)
model: default


# ── Output ───────────────────────────────────────────────────────────────────
# Where to send the digest after summarization.
# Options:
#   terminal      — print to stdout only (default; works fully offline)
#   github_pages  — print to stdout AND write docs/ then git push to GitHub Pages
output: terminal

# Generate a local HTML report in ~/Documents/ai-digest/index.html.
# Opens automatically in your browser when run manually.
# For wake/timer triggers, sends a clickable macOS notification instead.
# Set to false to disable local HTML entirely.
html_output: true


# ── GitHub Pages ─────────────────────────────────────────────────────────────
# Only used when output: github_pages.
# The digest is written to docs/index.html and docs/latest.txt, committed,
# and pushed to origin. GitHub Pages then serves it from that branch/folder.
#
# Setup (local push mode):
#   1. Fork this repo to your GitHub account
#   2. Fill in your username and repo name below
#   3. Enable Pages: Settings → Pages → Deploy from branch → main / docs
#   4. Run normally — each digest auto-commits and pushes to your fork
#
# Setup (GitHub Actions / cloud mode — no local machine needed):
#   See .github/workflows/digest.yml for the full workflow.
#   1. Set output: github_pages here
#   2. Add your LLM API key as a repo secret (Settings → Secrets → Actions)
#   3. Enable Pages as above
#   4. The workflow runs on a schedule and pushes automatically
github_pages:
  # Your GitHub username (required)
  username: YOUR_GITHUB_USERNAME

  # The repository name (defaults to "ai-digest")
  repo: ai-digest

  # Optional: custom domain if you have a CNAME configured
  # base_url: https://yourdomain.com/ai-digest

  # How many past digests to keep in the history page (default: 50)
  # max_history: 50

  # Push even when all new items are alpha/nightly/pre-release noise.
  # Default false — only pushes when at least one stable release is found.
  # push_noise: false


# ── Feeds ────────────────────────────────────────────────────────────────────
# Set to false to use only your custom_feeds below and skip the built-in defaults.
# Built-in defaults include Claude Code, Gemini CLI, Codex, Aider, Anthropic SDK,
# OpenAI SDK, OpenAI blog, Hugging Face blog, Last Week in AI, Latent Space.
include_defaults: true

# Add your own RSS/Atom feeds here. Any valid feed URL works.
# Each entry needs a name (used as a source label in the digest) and a url.
custom_feeds:
  # Examples — uncomment and edit as needed:

  # Blogs & newsletters
  # - name: "Simon Willison"
  #   url: "https://simonwillison.net/atom/everything/"
  # - name: "The Batch (DeepLearning.AI)"
  #   url: "https://www.deeplearning.ai/the-batch/feed/"
  # - name: "The Rundown AI"
  #   url: "https://rss.beehiiv.com/feeds/2R3C6Bt5wj.xml"
  # - name: "Latent Space"
  #   url: "https://www.latent.space/feed"
  # - name: "Interconnects"
  #   url: "https://www.interconnects.ai/feed"
  # - name: "Ahead of AI"
  #   url: "https://magazine.sebastianraschka.com/feed"

  # Hacker News (filtered)
  # - name: "Hacker News — LLMs"
  #   url: "https://hnrss.org/newest?q=LLM+OR+claude+OR+openai&count=15"
  # - name: "Hacker News — AI"
  #   url: "https://hnrss.org/newest?q=artificial+intelligence&points=50&count=10"

  # Company blogs
  # - name: "Anthropic"
  #   url: "https://www.anthropic.com/rss.xml"
  # - name: "OpenAI"
  #   url: "https://openai.com/news/rss.xml"
  # - name: "Google DeepMind"
