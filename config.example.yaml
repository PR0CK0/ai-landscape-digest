# ── Schedule ─────────────────────────────────────────────────────────────────
# How often to run automatically (seconds).
#   > 0  — run on lid open + background timer every N seconds (default: 3600 = 1 hour)
#     0  — run on every lid open with no throttle; no background timer installed
#
# After changing this, re-run: python3 -m ai_digest install-trigger
#
# Common values:
#   1800  = 30 minutes
#   3600  = 1 hour  (default)
#   7200  = 2 hours
#   86400 = once a day
check_interval: 3600


# ── Deduplication ─────────────────────────────────────────────────────────────
# Seen item IDs expire after this many days. After expiry, an item can surface
# again if it still appears in the feed. Default: 30 days.
# Set lower (e.g. 7) if you want a shorter memory.
seen_ttl_days: 30


# ── Misc ─────────────────────────────────────────────────────────────────────
# Print verbose feed-fetch info to stderr (shows per-feed item counts).
verbose: false

# Override the summarization prompt. Leave commented to use the built-in default.
# The prompt receives a list of new release items and should return a terse
# markdown digest. Example compact override:
# prompt: |
#   Terse markdown. Group by category. Bullet points only. No preamble.
#   Flag breaking changes with BREAKING. Skip alpha/nightly/dev releases.
